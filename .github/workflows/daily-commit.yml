name: Daily Commit

on:
  schedule:
    - cron: '45 02 * * *'  # 8:15 AM IST (02:45 UTC)

jobs:
  daily-commit:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Ensures we can access all history
    
    - name: Setup Git
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
    
    - name: Get or Initialize Commit Counter
      id: commit-counter
      shell: powershell
      run: |
        # Check if commit-info.md exists
        if (-not (Test-Path commit-info.md)) {
          "1" | Out-File -FilePath commit-info.md
        }
        
        # Read current commit number
        $COMMIT_NUM = Get-Content commit-info.md
        
        # Determine suffix
        switch ($COMMIT_NUM % 10) {
          1 { 
            $SUFFIX = if ($COMMIT_NUM -ne 11) { "st" } else { "th" }
          }
          2 { 
            $SUFFIX = if ($COMMIT_NUM -ne 12) { "nd" } else { "th" }
          }
          3 { 
            $SUFFIX = if ($COMMIT_NUM -ne 13) { "rd" } else { "th" }
          }
          default { $SUFFIX = "th" }
        }
        
        # Increment commit number
        $NEXT_COMMIT_NUM = [int]$COMMIT_NUM + 1
        $NEXT_COMMIT_NUM | Out-File -FilePath commit-info.md
        
        # Create commit file with suffix
        "This is the $COMMIT_NUM$SUFFIX daily automated commit." | Out-File -FilePath "daily-commit-$COMMIT_NUM$SUFFIX.txt"
    
    - name: Commit and Push
      run: |
        git add commit-info.md daily-commit-*.txt
        git commit -m "Automated daily commit $(Get-Date -Format 'yyyy-MM-dd')"
        git push
